      ${paras}
      <div class="interests">${ints}</div>
      <div class="map"><div class="mapcol"><div class="mt">People</div>${mapPeople}</div><div class="mapcol"><div class="mt">Businesses &amp; returns</div>${mapEnt}</div></div>
      <div class="caveat">✎ AI-drafted from your notes, milestones &amp; public sources — review &amp; edit before client use.</div>
    </div></div>`;
  return `<button class="back" id="back">← Back to ${state.from==='dashboard'?'dashboard':'clients'}</button>
    <div class="record">
      <div class="dhead"><div class="av lg ${r.owner==='Mat Cox'?'gold':''}" style="background:${r.owner==='Mat Cox'?'var(--gold)':'#26507f'};color:${r.owner==='Mat Cox'?'var(--navy)':'#fff'}">${initials(r.contact.name)}</div>
        <div><div class="nm serif">${r.name}</div><div class="row"><span class="pill">Tier ${r.tier}</span><span class="pill">${r.industry}</span><span class="pill">Owner · ${r.owner}</span><span class="pill">● ${r.health==='green'?'Healthy':r.health==='amber'?'Watch':'At risk'}</span></div></div></div>
      <div class="statline">
        <div class="stat"><div class="l">Annual fees</div><div class="v">${fmtMoney(r.fees)}</div></div>
        <div class="stat"><div class="l">Client revenue</div><div class="v">${r.revenue}</div></div>
        <div class="stat"><div class="l">Referral source</div><div class="v sm">${r.referral}</div></div>
        <div class="stat"><div class="l">Client since</div><div class="v sm">${r.since}</div></div>
        <div class="stat"><div class="l">Portal</div><div class="v sm"><span class="portal ${r.portal}">${r.portal==='None'?'Not set up':r.portal}</span></div></div>
        <div class="stat"><div class="l">Documents</div><div class="v sm">${r.docCount} on file</div></div>
      </div>
      <div class="dbody">
        ${summ}
        <div class="row2">
          <div class="sect"><h3>Key people</h3><div class="box">${people}</div></div>
          <div class="sect"><h3>Next step</h3><div class="nextbox"><div class="l">Next step</div><div class="a">${r.nextStep.action}</div><div class="d">Due ${r.nextStep.due}</div></div>
            <div style="margin-top:10px;font-size:11.5px;color:var(--muted)">Last touch: ${r.lastTouch.date} — ${r.lastTouch.note}</div></div>
        </div>
        <div class="sect"><h3>Entities &amp; returns in this relationship</h3><div class="box">${entities}</div></div>
        <div class="row2">
          <div class="sect"><h3>Key dates &amp; deadlines</h3><div class="box">${kdates}</div></div>
          <div class="sect"><h3>Engagements &amp; fees</h3><div class="box">${engs}</div></div>
        </div>
        <div class="sect"><h3>Services</h3><div class="services">${svcs}</div></div>
        <div class="row2">
          <div class="sect"><h3>Looking ahead — life &amp; business</h3><div class="box">${aheadHTML}</div></div>
          <div class="sect"><h3>Relationship milestones</h3><div class="ms">${miles}</div></div>
        </div>
        <div class="sect"><h3>Recent activity</h3><div class="tl">${tl}</div></div>
        <div class="sect"><h3>Notes</h3><div class="box notes">${r.notes}</div></div>
      </div>
    </div>`;
}

/* ---------- EMAIL ---------- */
function emailMatches(){ const e=state.email; return REL.filter(r=> (!e.tier||r.tier===e.tier) && (!e.portal||r.portal===e.portal) && (!e.service||r.services.some(s=>s.toLowerCase().includes(e.service.toLowerCase()))) ); }
function viewEmail(){
  const e=state.email, match=emailMatches(), tpl=TEMPLATES[e.template];
  const tierOpts=['','I','II','III'].map(v=>`<option value="${v}" ${e.tier===v?'selected':''}>${v?'Tier '+v:'All tiers'}</option>`).join('');
  const portalOpts=['','Active','Invited','None'].map(v=>`<option value="${v}" ${e.portal===v?'selected':''}>${v?('Portal: '+(v==='None'?'not set up':v)):'Any portal'}</option>`).join('');
  const svcOpts=['','CAS','Business Tax','Personal 1040','Advisory','Estate & Trust','Construction'].map(v=>`<option value="${v}" ${e.service===v?'selected':''}>${v?('Uses: '+v):'Any service'}</option>`).join('');
  const chips=match.map(r=>`<span class="chip">${r.contact.name.replace(/^Dr\.?\s+/,'')}</span>`).join('') || '<span class="hint">No clients match.</span>';
  const uniqEmails=[...new Set(match.map(r=>r.contact.email.toLowerCase()))]; const uniq=uniqEmails.length;
  const accounts=match.reduce((a,r)=>a+r.entities.length,0); const dupsPrevented=Math.max(accounts-uniq,0);
  const saved=[ {l:'All clients'}, {l:'Tier I',tier:'I'}, {l:'Uses CAS',service:'CAS'}, {l:'Individuals',tier:'III'}, {l:'Portal not set up',portal:'None'} ];
  const savedHTML=saved.map(s=>`<span class="savedchip" data-tier="${s.tier||''}" data-portal="${s.portal||''}" data-service="${s.service||''}">${s.l}</span>`).join('');
  const tplOpts=Object.keys(TEMPLATES).map(k=>`<option ${e.template===k?'selected':''}>${k}</option>`).join('');
  const kpiHTML=[ {n:REL.length,l:'Subscribers'}, {n:'74%',l:'Avg open rate'}, {n:'12',l:'Campaigns sent'}, {n:'3',l:'Active automations'} ].map(k=>`<div class="kpi"><div class="n">${k.n}</div><div class="l">${k.l}</div></div>`).join('');
  const bHTML=BROADCASTS.map(b=>`<tr><td style="font-weight:600;color:var(--navy)">${b.name}</td><td>${b.audience}</td><td>${b.date}</td><td>${b.sent}</td><td>${b.open}</td><td>${b.click}</td></tr>`).join('');
  const autos=[ {n:'Welcome sequence',d:'New clients get a 3-email intro over their first two weeks',on:true}, {n:'Quarterly check-in',d:'A light "how are things?" nudge from the relationship owner',on:true}, {n:'Post-filing thank-you',d:'Sent automatically after a return is delivered',on:false}, {n:'Birthday greeting',d:'A warm note on each contact\'s birthday',on:true} ];
  const autoHTML=autos.map(a=>`<div class="auto"><div class="sw ${a.on?'on':''}"></div><div><div class="an">${a.n}</div><div class="ad">${a.d}</div></div></div>`).join('');
  const simpleMail=`<div class="mail"><div class="mh"><div class="b">TITUS <span>CPAs</span></div></div><div class="mb"><div class="mt">${tpl.title}</div><p>Hi <b>{{First name}}</b>,</p><p>${tpl.body}</p><a class="cta">${tpl.cta}</a></div>
          <div class="mf">Titus CPAs · 3100 Independence Dr, Suite 100, Birmingham, AL 35209<br>You're receiving this as a client of Titus CPAs. <a>Unsubscribe</a> · Sent individually — recipients never see each other.</div></div>`;
  const newsletterPreview=`<div style="border:1px solid #e3e0d8;border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 6px 20px rgba(19,43,73,.10)">
          <div style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:#f3f1ea;border-bottom:1px solid #e3e0d8">
            <span style="width:9px;height:9px;border-radius:50%;background:#e6635a"></span><span style="width:9px;height:9px;border-radius:50%;background:#e6b34a"></span><span style="width:9px;height:9px;border-radius:50%;background:#5db075"></span>
            <span style="margin-left:8px;font-size:11px;color:#6b7280">The Bottom Line · Issue No. 01 · rendered from your actual newsletter file</span>
          </div>
          <iframe src="newsletter-bottom-line-jul2026.html" title="The Bottom Line newsletter" style="width:100%;height:560px;border:0;display:block;background:#fff"></iframe>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">↑ Scroll inside the frame to read the whole issue. This is <b>newsletter-bottom-line-jul2026.html</b> — the same file that goes out to each recipient individually.</div>`;
  const previewHTML = e.template==='Newsletter' ? newsletterPreview : simpleMail;
  return `
    <h2 class="page serif">Email &amp; Newsletters</h2><p class="psub">Segment your clients and reach them with branded, compliant email — powered by your relationship data.</p>
    <div class="kpis">${kpiHTML}</div>
    <div class="email-grid">
      <div class="panel">
        <div class="ph"><h3>Build an audience</h3><span class="hint">Live from client data</span></div>
        <div class="seg-filters"><select id="segTier" data-k="tier">${tierOpts}</select><select id="segPortal" data-k="portal">${portalOpts}</select><select id="segService" data-k="service">${svcOpts}</select></div>
        <div class="box" style="text-align:center;padding:16px"><div class="count-big">${uniq}</div><div class="hint">unique ${uniq===1?'recipient':'recipients'} · deduplicated by email</div>
          ${dupsPrevented>0?`<div style="font-size:11.5px;color:var(--green);margin-top:4px">✓ ${match.length} relationships / ${accounts} accounts → ${uniq} unique — ${dupsPrevented} duplicate ${dupsPrevented===1?'send':'sends'} prevented</div>`:`<div style="font-size:11.5px;color:var(--muted);margin-top:4px">${match.length} relationship${match.length===1?'':'s'} · no duplicates</div>`}
          <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px">${chips}</div></div>
        <div style="margin-top:12px"><div class="hint" style="margin-bottom:6px">Saved segments</div><div class="saved">${savedHTML}</div></div>
      </div>
      <div class="panel">
        <div class="ph"><h3>Compose</h3><span class="hint">Branded template</span></div>
        <div class="field" style="margin-bottom:10px"><label>Subject</label><input id="subjInput" value="${e.subject.replace(/"/g,'&quot;')}" /></div>
        <div class="field" style="margin-bottom:14px"><label>Template</label><select id="tplSel">${tplOpts}</select></div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Preview · Subject: <b id="subjLine">${e.subject||'(no subject)'}</b></div>
        ${previewHTML}
        <div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap"><button class="btn gold" id="sendBtn">Send to ${uniq} recipient${uniq===1?'':'s'}</button><button class="btn ghost">Schedule</button></div>
        <div id="sendMsg" style="font-size:12px;color:var(--green);margin-top:8px;min-height:14px"></div>
      </div>
    </div>
    <div class="panel"><div class="ph"><h3>Recent broadcasts</h3><span class="hint">Opens · clicks</span></div><table class="tbl"><thead><tr><th>Campaign</th><th>Audience</th><th>Sent</th><th>Recipients</th><th>Open</th><th>Click</th></tr></thead><tbody>${bHTML}</tbody></table></div>
    <div class="email-grid">
      <div class="panel"><div class="ph"><h3>Automations</h3><span class="hint">Set-and-forget cadences</span></div>${autoHTML}</div>
      <div class="panel"><div class="ph"><h3>Deliverability &amp; compliance</h3><span class="hint">Built in</span></div>
        <div style="font-size:13px;color:#3f4751;line-height:1.7">
          <div>✓ <b>De-duplicated by email</b> — a client never gets the same message twice, even if their address is on multiple accounts or entities (their personal 1040 and their business).</div>
          <div>✓ One-click <b>unsubscribe</b> + firm mailing address on every send (CAN-SPAM).</div>
          <div>✓ Emails sent <b>individually</b> — clients never see each other's addresses.</div>
          <div>✓ Sends from <b>tituscpa.com</b> (SPF/DKIM verified) via Resend Broadcasts.</div>
          <div>✓ Unsubscribes are honored automatically and skipped on future sends.</div>
        </div></div>
    </div>`;
}
function bindEmail(){
  ['segTier','segPortal','segService'].forEach(id=>{ const el=$(id); if(el) el.onchange=()=>{ state.email[el.dataset.k]=el.value; render(); }; });
  const tpl=$('tplSel'); if(tpl) tpl.onchange=()=>{ state.email.template=tpl.value; render(); };
  const subj=$('subjInput'); if(subj){ subj.oninput=()=>{ state.email.subject=subj.value; const s=$('subjLine'); if(s) s.textContent=subj.value||'(no subject)'; }; }
  document.querySelectorAll('.savedchip').forEach(c=>c.onclick=()=>{ state.email.tier=c.dataset.tier; state.email.portal=c.dataset.portal; state.email.service=c.dataset.service; render(); });
  document.querySelectorAll('.sw').forEach(s=>s.onclick=()=>s.classList.toggle('on'));
  const sb=$('sendBtn'); if(sb) sb.onclick=()=>{ const m=$('sendMsg'); if(m) m.textContent='✓ Demo only — in production this queues an individual, tracked send to each recipient via Resend Broadcasts.'; };
}

function openRecord(id){ state.from=state.view; state.selected=id; state.view='record'; render(); }

function render(){
  $('wrap').innerHTML = state.view==='dashboard'?viewDashboard() : state.view==='clients'?viewClients() : state.view==='email'?viewEmail() : viewRecord();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.view===state.view));
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openRecord(+el.dataset.open));
  const s=$('search'); if(s){ s.oninput=e=>{ state.query=e.target.value; render(); }; s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
  const b=$('back'); if(b) b.onclick=()=>{ state.view=state.from||'clients'; render(); };
  if(state.view==='email') bindEmail();
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ state.view=t.dataset.view; render(); });
render();
</script>
</body>
</html>
