<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Titus CPAs — Client Hub (Prototype)</title>
<style>
  :root{ color-scheme:light; --navy:#132b49; --navy2:#1d3c63; --gold:#d1af44; --ink:#26303c; --muted:#6b7686; --line:#e7e1d3; --card:#ffffff; --bg:#f7f2e9; --green:#2f9e74; --amber:#c9803a; --red:#c0533f; }
  *{ box-sizing:border-box; } html,body{ margin:0; }

  .serif{ font-family:Georgia,"Times New Roman",serif; }
  .top{ background:var(--navy); color:#fff; padding:0 22px; display:flex; align-items:center; gap:18px; position:sticky; top:0; z-index:10; }

  .mini .mm{ flex:1; } .mini .nm{ font-weight:600; color:var(--navy); font-size:13.5px; } .mini .sub{ font-size:12px; color:var(--muted); } .mini .end{ text-align:right; font-size:12px; color:var(--muted); }
  .tagr{ font-size:11px; font-weight:700; border-radius:20px; padding:2px 8px; }
  .hd{ width:9px; height:9px; border-radius:50%; flex:none; display:inline-block; } .hd.green{ background:var(--green);} .hd.amber{ background:var(--amber);} .hd.red{ background:var(--red);}
  .pstat{ display:flex; gap:10px; flex-wrap:wrap; } .pcard{ flex:1; min-width:110px; border:1px solid var(--line); border-radius:11px; padding:12px; text-align:center; } .pcard .n{ font-family:Georgia,serif; font-size:20px; font-weight:700; } .pcard .l{ font-size:11px; color:var(--muted); margin-top:2px; }

  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .ccard{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .05s; }

  .statline{ display:flex; flex-wrap:wrap; border-bottom:1px solid var(--line); }

  .person .pn{ font-weight:600; color:var(--navy); font-size:13.5px; } .person .pr{ font-size:12px; color:var(--muted); }
  .ent{ display:flex; align-items:flex-start; gap:11px; padding:11px 0; border-bottom:1px solid #f0ece1; } .ent:last-child{ border-bottom:none; }
  .ent .en{ font-weight:600; color:var(--navy); font-size:14px; } .ent .es{ font-size:12px; color:var(--muted); } .etype{ font-size:10.5px; font-weight:700; color:#5a6675; background:#f1f0ea; border-radius:6px; padding:2px 7px; margin-left:auto; white-space:nowrap; }

  .tl .t{ display:flex; gap:11px; padding:9px 0; border-bottom:1px solid #f0ece1; } .tl .t:last-child{ border-bottom:none; } .tl .tt{ font-size:10.5px; font-weight:700; color:#fff; background:var(--navy2); border-radius:6px; padding:2px 7px; height:fit-content; white-space:nowrap; } .tl .tn{ font-size:13.5px; } .tl .tm{ font-size:11.5px; color:var(--muted); margin-top:1px; }

  .al{ font-size:13.5px; font-weight:600; color:var(--navy); } .aw{ font-size:11.5px; color:var(--muted); font-weight:400; margin-top:1px; }
  .email-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; } @media(max-width:900px){ .email-grid{ grid-template-columns:1fr; } }
  .seg-filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; } .seg-filters select{ padding:8px 10px; border:1px solid var(--line); border-radius:9px; background:#fff; font-size:13px; }
  .count-big{ font-family:Georgia,serif; font-size:34px; color:var(--navy); font-weight:700; }

  .btn{ background:var(--navy); color:#fff; border:none; border-radius:9px; padding:9px 15px; font-size:13px; font-weight:600; cursor:pointer; } .btn.gold{ background:var(--gold); color:var(--navy); } .btn.ghost{ background:#fff; color:var(--navy); border:1px solid var(--line); }
  .field label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); display:block; margin-bottom:5px; } .field input,.field select{ width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:9px; background:#fff; font-size:13.5px; } .field input:focus,.field select:focus{ outline:none; border-color:var(--gold); }
  .mail{ border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
  .mail .mh{ background:var(--navy); color:#fff; text-align:center; padding:18px; border-bottom:3px solid var(--gold); } .mail .mh .b{ font-size:14px; letter-spacing:2.5px; font-weight:700; } .mail .mh .b span{ color:var(--gold); }
  .mail .mb{ padding:20px; } .mail .mt{ font-family:Georgia,serif; font-size:19px; color:var(--navy); margin:0 0 10px; } .mail .mb p{ font-size:13.5px; color:#3f4751; margin:0 0 12px; }

  .tbl{ width:100%; border-collapse:collapse; } .tbl th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); padding:8px 10px; border-bottom:1px solid var(--line); } .tbl td{ padding:9px 10px; border-bottom:1px solid #f0ece1; font-size:13px; }

  /* --- section switch + Groundwork --- */

function parseD(s){ return new Date(s); }
function daysUntil(d){ return Math.round((d-TODAY)/86400000); }
function nextBirthday(b){ let y=TODAY.getFullYear(); let d=new Date(y,b.m-1,b.d); if(d<TODAY) d=new Date(y+1,b.m-1,b.d); return d; }
function fmtMD(d){ return MONTHS[d.getMonth()]+' '+d.getDate(); }

function viewClients(){
  const q=state.query.trim().toLowerCase();
  const matches=r=>{ if(!q) return true; const hay=(r.name+' '+r.owner+' '+r.contact.name+' '+r.industry+' '+r.entities.map(e=>e.name+' '+e.type).join(' ')).toLowerCase(); return hay.includes(q); };
  const list=REL.filter(matches);
  const grouped=state.clientsGroup==='family';
  const dot=h=>`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${h==='green'?'#2f9e74':'#d1a63a'};margin-right:7px;vertical-align:middle" title="Health"></span>`;
  const tb=t=>`<span class="tier ${t}">Tier ${t}</span>`;
  const first=n=>n.split(' ')[0];
  const toolbar=`<div style="display:flex;align-items:center;gap:12px;margin:0 0 14px;flex-wrap:wrap">
      <input class="search" id="search" placeholder="Search clients, owners, entities…" value="${state.query.replace(/"/g,'&quot;')}" style="margin:0;flex:1;min-width:220px;max-width:none" />
      <div class="seg"><button data-cg="flat" class="${!grouped?'on':''}">Rows</button><button data-cg="family" class="${grouped?'on':''}">By family</button></div>
    </div>`;
  let table;
  if(grouped){
    const body=list.map(r=>{
      const head=`<tr class="grp" data-open="${r.id}"><td colspan="5"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span class="gname">${dot(r.health)}${r.name}</span>${tb(r.tier)}<span class="fam">${r.contact.name} · ${r.industry}</span><span style="margin-left:auto;color:var(--muted);font-size:12px">${r.entities.length} entities · ${fmtMoney(r.fees)}/yr · ${first(r.owner)} · Portal: ${r.portal==='None'?'—':r.portal}</span><span class="open" style="margin:0">Open family →</span></div></td></tr>`;
      const kids=r.entities.map(e=>`<tr data-open="${r.id}"><td style="padding-left:28px;font-weight:600;color:var(--navy)">${e.name}</td><td>${e.type}</td><td class="fam">${e.note||''}</td><td>${first(r.owner)}</td><td style="text-align:right"><span class="open" style="margin:0">Open →</span></td></tr>`).join('');
      return head+kids;
    }).join('')||`<tr><td colspan="5"><div class="hint" style="padding:10px">No matches.</div></td></tr>`;
    table=`<table class="tbl clist"><thead><tr><th>Client / return</th><th>Type</th><th>Detail</th><th>Mgr</th><th></th></tr></thead><tbody>${body}</tbody></table>`;
  } else {
    const erows=[]; list.forEach(r=>r.entities.forEach(e=>erows.push({r,e})));
    const body=erows.map(({r,e})=>`<tr data-open="${r.id}"><td style="font-weight:600;color:var(--navy)">${e.name}</td><td>${e.type}</td><td>${dot(r.health)}${r.name}</td><td>${first(r.owner)}</td><td>${tb(r.tier)}</td><td style="text-align:right"><span class="open" style="margin:0">Open →</span></td></tr>`).join('')||`<tr><td colspan="6"><div class="hint" style="padding:10px">No matches.</div></td></tr>`;
    table=`<table class="tbl clist"><thead><tr><th>Client / return</th><th>Type</th><th>Family grouping</th><th>Mgr</th><th>Tier</th><th></th></tr></thead><tbody>${body}</tbody></table>`;
  }
  return `<h2 class="page serif">Clients</h2><p class="psub">Every client is a relationship — owner, entities, and family together. ${grouped?'Grouped by family — ':''}click any row to open the full record.</p>
    ${toolbar}
    <div class="panel" style="padding:0;overflow:hidden">${table}</div>`;

  const paras=en.summary.trim().split(/\n\n+/).map(x=>`<p>${x}</p>`).join('');
  const ints=(en.interests||[]).map(i=>`<span class="int">${i}</span>`).join('');
  const mapPeople=r.people.map(p=>`<div class="node">${p.name}<div class="s">${p.role}</div></div>`).join('');
  const mapEnt=r.entities.map(e=>`<div class="node">${e.name}<div class="s">${e.type}</div></div>`).join('');
  const aheadItems=AHEAD[r.id]||[];
  const aheadHTML=aheadItems.length?aheadItems.map(a=>`<div class="ahead"><span class="acat" style="background:${CAT_B[a.cat]};color:${CAT_C[a.cat]}">${a.cat}</span><div><div class="al">${a.label}</div><div class="aw">${a.when}</div></div></div>`).join(''):`<div style="font-size:12.5px;color:var(--muted)">No upcoming milestones logged yet.</div>`;
  const summ=`<div class="sect"><h3>Client summary</h3><div class="summary-card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><span class="ai-badge">✦ AI SUMMARY</span><span style="font-size:11px;color:var(--muted)">Generated Jul 8, 2026 · <button class="regen" id="regen">Regenerate</button></span></div>
      ${paras}
      <div class="interests">${ints}</div>
      <div class="map"><div class="mapcol"><div class="mt">People</div>${mapPeople}</div><div class="mapcol"><div class="mt">Businesses &amp; returns</div>${mapEnt}</div></div>
      <div class="caveat">✎ AI-drafted from your notes, milestones &amp; public sources — review &amp; edit before client use.</div>
    </div></div>`;
  return `<button class="back" id="back">← Back to ${state.from==='dashboard'?'dashboard':'clients'}</button>
    <div class="record">
      <div class="dhead"><div class="av lg ${r.owner==='Mat Cox'?'gold':''}" style="background:${r.owner==='Mat Cox'?'var(--gold)':'#26507f'};color:${r.owner==='Mat Cox'?'var(--navy)':'#fff'}">${initials(r.contact.name)}</div>
        <div><div class="nm serif">${r.name}</div><div class="row"><span class="pill">Tier ${r.tier}</span><span class="pill">${r.industry}</span><span class="pill">Owner · ${r.owner}</span><span class="pill">● ${r.health==='green'?'Healthy':r.health==='amber'?'Watch':'At risk'}</span></div></div></div>
      <div class="statline">
        <div class="stat"><div class="l">Annual fees</div><div class="v">${fmtMoney(r.fees)}</div></div>
        <div class="stat"><div class="l">Client revenue</div><div class="v">${r.revenue}</div></div>
        <div class="stat"><div class="l">Referral source</div><div class="v sm">${r.referral}</div></div>
        <div class="stat"><div class="l">Client since</div><div class="v sm">${r.since}</div></div>
        <div class="stat"><div class="l">Portal</div><div class="v sm"><span class="portal ${r.portal}">${r.portal==='None'?'Not set up':r.portal}</span></div></div>
        <div class="stat"><div class="l">Documents</div><div class="v sm">${r.docCount} on file</div></div>
      </div>
      <div class="dbody">
        ${summ}
        <div class="row2">
          <div class="sect"><h3>Key people</h3><div class="box">${people}</div></div>
          <div class="sect"><h3>Next step</h3><div class="nextbox"><div class="l">Next step</div><div class="a">${r.nextStep.action}</div><div class="d">Due ${r.nextStep.due}</div></div>
            <div style="margin-top:10px;font-size:11.5px;color:var(--muted)">Last touch: ${r.lastTouch.date} — ${r.lastTouch.note}</div></div>
        </div>
        <div class="sect"><h3>Entities &amp; returns in this relationship</h3><div class="box">${entities}</div></div>
        <div class="row2">
          <div class="sect"><h3>Key dates &amp; deadlines</h3><div class="box">${kdates}</div></div>
          <div class="sect"><h3>Engagements &amp; fees</h3><div class="box">${engs}</div></div>
        </div>
        <div class="sect"><h3>Services</h3><div class="services">${svcs}</div></div>
        <div class="row2">
          <div class="sect"><h3>Looking ahead — life &amp; business</h3><div class="box">${aheadHTML}</div></div>
          <div class="sect"><h3>Relationship milestones</h3><div class="ms">${miles}</div></div>
        </div>
        <div class="sect"><h3>Recent activity</h3><div class="tl">${tl}</div></div>
        <div class="sect"><h3>Notes</h3><div class="box notes">${r.notes}</div></div>
      </div>
    </div>`;
}

/* ---------- EMAIL ---------- */
function emailMatches(){ const e=state.email; return REL.filter(r=> (!e.tier||r.tier===e.tier) && (!e.portal||r.portal===e.portal) && (!e.service||r.services.some(s=>s.toLowerCase().includes(e.service.toLowerCase()))) ); }
function viewEmail(){
  const e=state.email, match=emailMatches(), tpl=TEMPLATES[e.template];
  const uniqEmails=[...new Set(match.map(r=>r.contact.email.toLowerCase()))]; const uniq=uniqEmails.length;
  const accounts=match.reduce((a,r)=>a+r.entities.length,0); const dupsPrevented=Math.max(accounts-uniq,0);
  const allOn=!e.tier&&!e.portal&&!e.service;
  const audHTML=`<button class="aud ${allOn?'on':''}" data-aud="all">All clients</button>`+AUD_FILTERS.map((f,i)=>{ const on=e[f.k]===f.v; return `<button class="aud ${on?'on':''}" data-aud="${i}">${f.l}</button>`; }).join('');
  const fparts=[]; if(e.tier)fparts.push('Tier '+e.tier); if(e.service)fparts.push('uses '+e.service); if(e.portal)fparts.push('portal '+(e.portal==='None'?'not set up':e.portal));
  const filterDesc=fparts.length?fparts.join(' + '):'All clients';
  const dupRows=match.filter(r=>r.entities.length>1).map(r=>`<li><b>${r.contact.name.replace(/^Dr\.?\s+/,'')}</b> — ${r.entities.length} accounts (${r.entities.map(x=>x.type).join(', ')}) → <b>1 email</b></li>`).join('');
  const dedupeDetail=dupsPrevented>0?`<details class="dedupe"><summary>Why ${uniq} and not ${accounts}? See how de-duplication works</summary><div class="dd-body"><p>Several clients have more than one entity or return with the firm. Each person still gets <b>exactly one</b> email:</p><ul>${dupRows}</ul><p class="dd-foot">${accounts} accounts across ${match.length} client${match.length===1?'':'s'} → <b>${uniq} unique inbox${uniq===1?'':'es'}</b> · ${dupsPrevented} duplicate ${dupsPrevented===1?'send':'sends'} prevented.</p></div></details>`:'';
  const MSG_CARDS=[ {k:'Newsletter',t:'The Bottom Line — Issue 01',d:'Your branded client newsletter'}, {k:'Announcement',t:'Announcement',d:'A short firm-wide update'}, {k:'Check-in',t:'Personal check-in',d:'A warm, one-to-one note'}, {k:'Custom',t:'＋ New email',d:'Start from a blank branded template'}, {k:'Imported',t:'⇪ Import HTML',d:'Bring in your own designed email'} ];
  const msgHTML=MSG_CARDS.map(m=>`<div class="msg ${e.template===m.k?'on':''}" data-tpl="${m.k}"><div class="mt2">${m.t}</div><div class="md">${m.d}</div></div>`).join('');
  const doc=e.docs[e.template]||e.docs.Custom;
  const isImport=e.template==='Imported';
  // --- editor / import panel ---
  let editorHTML='';
  if(isImport){
    const has=e.imported;
    editorHTML=`<div class="editor">
      <div class="ed-h">Import an email</div>
      <p class="hint" style="margin:0 0 12px">Upload an <b>.html</b> file (like the newsletter) or paste HTML — it becomes a sendable email, previewed live below and de-duplicated the same way.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px"><label class="btn ghost" style="cursor:pointer;margin:0">Choose .html file<input type="file" id="impFile" accept=".html,.htm,text/html" style="display:none"></label>${has?`<span class="hint">Loaded: <b style="color:var(--navy)">${esc(e.imported.name)}</b></span><button class="btn ghost" id="impClear" style="padding:6px 12px">Remove</button>`:'<span class="hint">No file chosen yet</span>'}</div>
      <div class="field"><label>…or paste HTML</label><textarea id="impPaste" rows="4" placeholder="<html>…your email…</html>">${has&&e.imported.name==='Pasted HTML'?esc(e.imported.html):''}</textarea></div>
      <button class="btn ghost" id="impUse" style="margin-top:8px">Use pasted HTML</button>
    </div>`;
  } else {
    const secRows=(doc.sections||[]).map((s,i)=>`<div class="ed-sec"><div class="ed-secrow"><input data-sec="${i}" data-f="h" value="${esc(s.h)}" placeholder="Section heading" /><button class="ed-del" data-delsec="${i}" title="Remove section">✕</button></div><textarea data-sec="${i}" data-f="b" rows="2" placeholder="Section text…">${esc(s.b)}</textarea></div>`).join('');
    editorHTML=`<div class="editor" ${e.editing?'':'style="display:none"'}>
      <div class="ed-h">Edit content <span class="hint" style="font-weight:400">— changes preview live, stays on-brand</span></div>
      <div class="ed-grid">
        <div class="field"><label>Eyebrow / issue line</label><input id="edIssue" value="${esc(doc.issue)}" placeholder="e.g. Issue No. 02 · August 2026" /></div>
        <div class="field"><label>Headline</label><input id="edTitle" value="${esc(doc.title)}" placeholder="Your headline" /></div>
      </div>
      <div class="field"><label>Intro (blank line = new paragraph)</label><textarea id="edIntro" rows="4" placeholder="Opening message…">${esc(doc.intro)}</textarea></div>
      <div class="ed-h2">Sections</div>
      <div id="edSecs">${secRows||'<div class="hint">No sections yet.</div>'}</div>
      <button class="btn ghost" id="edAddSec" style="margin:8px 0 4px;padding:6px 12px">＋ Add section</button>
      <div class="ed-grid">
        <div class="field"><label>Button label (optional)</label><input id="edCtaText" value="${esc(doc.ctaText)}" placeholder="e.g. Schedule a call" /></div>
        <div class="field"><label>Reply-to email</label><input id="edCtaEmail" value="${esc(doc.ctaEmail)}" placeholder="support@tituscpa.com" /></div>
      </div>
    </div>`;
  }
  // --- preview ---
  let previewHTML;
  if(isImport){
    previewHTML = e.imported ? `<div class="mail-frame"><div class="mf-bar"><span class="d1"></span><span class="d2"></span><span class="d3"></span><span style="margin-left:8px;font-size:11px;color:#6b7280">${esc(e.imported.name)} · imported</span></div><iframe title="Imported email" srcdoc="${esc(e.imported.html)}" style="width:100%;height:520px;border:0;display:block;background:#fff"></iframe></div>` : `<div class="panel" style="text-align:center;color:var(--muted);padding:40px">Import a file or paste HTML above to preview it here.</div>`;
  } else if(e.template==='Newsletter' && !e.editing && JSON.stringify(doc)===JSON.stringify(DOCS.Newsletter)){
    previewHTML = `<div class="mail-frame"><div class="mf-bar"><span class="d1"></span><span class="d2"></span><span class="d3"></span><span style="margin-left:8px;font-size:11px;color:#6b7280">The Bottom Line · Issue No. 01 · designed file</span><a href="newsletter-bottom-line-jul2026.html" target="_blank" style="margin-left:auto;font-size:11px;color:var(--gold-deep)">Open ↗</a></div><iframe src="newsletter-bottom-line-jul2026.html" title="The Bottom Line newsletter" style="width:100%;height:520px;border:0;display:block;background:#fff"></iframe></div>`;
  } else {
    previewHTML = `<div style="box-shadow:0 6px 20px rgba(19,43,73,.10);border-radius:12px">${renderEmailDoc(doc)}</div>`;
  }
  const editBtn = isImport ? '' : `<button class="btn ghost" id="editToggle">${e.editing?'✓ Done editing':'✎ Edit content'}</button>`;
  const bHTML=BROADCASTS.map(b=>`<tr><td style="font-weight:600;color:var(--navy)">${b.name}</td><td>${b.audience}</td><td>${b.date}</td><td>${b.sent}</td><td>${b.open}</td><td>${b.click}</td></tr>`).join('');
  return `
    <h2 class="page serif">Email &amp; Marketing</h2><p class="psub">Send a branded email to your clients in three steps. The tricky parts — individual sends, unsubscribe, de-duplication — are handled for you.</p>
    <div class="step">
      <div class="step-h"><span class="snum">1</span><h3>Who's it going to?</h3><span class="sh">deduplicated by email</span></div>
      <div class="audrow">${audHTML}</div>
      <div class="hint" style="margin:2px 0 8px">Pick one or combine several — filters stack. Sending to: <b style="color:var(--navy)">${filterDesc}</b></div>
      <div class="recip"><span class="big2">${uniq}</span><span class="hint">${uniq===1?'person':'people'} will receive this${dupsPrevented>0?` &nbsp;·&nbsp; <span style="color:var(--green);font-weight:600">${dupsPrevented} duplicate ${dupsPrevented===1?'send':'sends'} prevented</span> (one client, one email)`:''}</span></div>
      ${dedupeDetail}
    </div>
    <div class="step">
      <div class="step-h"><span class="snum">2</span><h3>What are you sending?</h3><span class="sh">edit any of these · or import your own</span></div>
      <div class="msgrow msg5">${msgHTML}</div>
      ${editBtn?`<div style="margin-top:12px">${editBtn}</div>`:''}
      ${editorHTML}
      <div class="field" style="margin-top:14px"><label>Subject line</label><input id="subjInput" value="${esc(e.subject)}" placeholder="What clients see in their inbox" /></div>
    </div>
    <div class="step">
      <div class="step-h"><span class="snum">3</span><h3>Preview &amp; send</h3><span class="sh">Subject: <b id="subjLine">${e.subject||'(no subject)'}</b></span></div>
      <div id="emailPreview">${previewHTML}</div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:16px"><button class="btn ghost" id="testBtn">Send test to myself</button><button class="btn gold" id="sendBtn" style="font-size:15px;padding:12px 22px">Send to ${uniq} recipient${uniq===1?'':'s'}</button><span class="hint">✓ Sent individually · unsubscribe + address included · from tituscpa.com</span></div>
      <div class="hint" style="margin-top:8px">Always send a test to yourself first — it's the same email your clients get, so you can proof it in a real inbox before it goes out.</div>
      <div id="sendMsg" style="font-size:12px;color:var(--green);margin-top:10px;min-height:14px"></div>
    </div>
    <div class="panel"><div class="ph"><h3>Recent sends</h3><span class="hint">opens · clicks</span></div><table class="tbl"><thead><tr><th>Campaign</th><th>Audience</th><th>Sent</th><th>Recipients</th><th>Open</th><th>Click</th></tr></thead><tbody>${bHTML}</tbody></table></div>`;
}
function bindEmail(){
  const em=state.email; const doc=em.docs[em.template];
  const refresh=()=>{ const p=$('emailPreview'); if(p&&doc) p.innerHTML=`<div style="box-shadow:0 6px 20px rgba(19,43,73,.10);border-radius:12px">${renderEmailDoc(doc)}</div>`; };
  document.querySelectorAll('[data-aud]').forEach(b=>b.onclick=()=>{ const d=b.dataset.aud; if(d==='all'){ em.tier=''; em.portal=''; em.service=''; } else { const f=AUD_FILTERS[+d]; em[f.k]=(em[f.k]===f.v)?'':f.v; } render(); });
  document.querySelectorAll('[data-tpl]').forEach(b=>b.onclick=()=>{ const k=b.dataset.tpl; em.template=k; const ns=TPL_SUBJECT[k]; if(ns) em.subject=ns; if(k==='Custom') em.editing=true; render(); });
  const et=$('editToggle'); if(et) et.onclick=()=>{ em.editing=!em.editing; render(); };
  // guided fields — live preview, no full re-render (keeps cursor focus)
  const bindF=(id,key)=>{ const el=$(id); if(el) el.oninput=()=>{ doc[key]=el.value; refresh(); }; };
  bindF('edIssue','issue'); bindF('edTitle','title'); bindF('edIntro','intro'); bindF('edCtaText','ctaText'); bindF('edCtaEmail','ctaEmail');
  document.querySelectorAll('[data-sec]').forEach(el=>el.oninput=()=>{ doc.sections[+el.dataset.sec][el.dataset.f]=el.value; refresh(); });
  const add=$('edAddSec'); if(add) add.onclick=()=>{ doc.sections.push({h:'',b:''}); render(); };
  document.querySelectorAll('[data-delsec]').forEach(b=>b.onclick=()=>{ doc.sections.splice(+b.dataset.delsec,1); render(); });
  // import
  const impFile=$('impFile'); if(impFile) impFile.onchange=()=>{ const f=impFile.files&&impFile.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ em.imported={name:f.name, html:String(rd.result)}; render(); }; rd.readAsText(f); };
  const impUse=$('impUse'); if(impUse) impUse.onclick=()=>{ const v=$('impPaste')?$('impPaste').value:''; if(v.trim()){ em.imported={name:'Pasted HTML', html:v}; render(); } };
  const impClear=$('impClear'); if(impClear) impClear.onclick=()=>{ em.imported=null; render(); };
  const subj=$('subjInput'); if(subj){ subj.oninput=()=>{ em.subject=subj.value; const s=$('subjLine'); if(s) s.textContent=subj.value||'(no subject)'; }; }
  const tb=$('testBtn'); if(tb) tb.onclick=()=>{ const m=$('sendMsg'); if(m) m.textContent='✓ Test sent to '+MY_EMAIL+' — proof it in your own inbox before sending to clients. (Demo)'; };
  const sb=$('sendBtn'); if(sb) sb.onclick=()=>{ const m=$('sendMsg'); if(m) m.textContent='✓ Demo only — in production this queues an individual, tracked send to each recipient via Resend Broadcasts.'; };
}

function gwFullscreen(){
  const f=document.getElementById('gwFrame'); if(!f) return;
  // Fullscreen the SAME already-signed-in frame — no new tab, no second login code.
  const req=f.requestFullscreen||f.webkitRequestFullscreen||f.msRequestFullscreen;
  if(req){ try{ const p=req.call(f); if(p&&p.catch) p.catch(()=>gwMaxToggle(f)); return; }catch(e){} }
  gwMaxToggle(f); // fallback: fill the viewport in-page (still the same session)
}
function gwMaxToggle(f){
  const on=f.classList.toggle('gw-max');
  let x=document.getElementById('gwExit');
  if(on&&!x){ x=document.createElement('button'); x.id='gwExit'; x.className='btn'; x.textContent='Exit full-screen ✕'; x.style.cssText='position:fixed;top:14px;right:16px;z-index:100000'; x.onclick=()=>gwMaxToggle(f); document.body.appendChild(x); }
  else if(!on&&x){ x.remove(); }
}
function openRecord(id){ state.section='legacy'; state.from=state.view; state.selected=id; state.view='record'; render(); }

const SECTIONS={ ground:{label:'Groundwork', tabs:[]}, legacy:{label:'Legacy Builder', tabs:[['dashboard','Dashboard'],['clients','Clients'],['email','Email & Marketing']]} };
function renderNav(){
  $('secsw').innerHTML=Object.entries(SECTIONS).map(([k,v])=>`<button data-sec="${k}" class="${state.section===k?'on':''}">${v.label}</button>`).join('');
  $('tabs').innerHTML=SECTIONS[state.section].tabs.map(([v,l])=>`<button class="tab ${state.view===v?'on':''}" data-view="${v}">${l}</button>`).join('');
  $('secsw').querySelectorAll('button').forEach(b=>b.onclick=()=>{ state.section=b.dataset.sec; state.view=(SECTIONS[state.section].tabs[0]||['dashboard'])[0]; render(); });
  $('tabs').querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ state.view=t.dataset.view; render(); });
}
function render(){
  let html;
  if(state.section==='ground'){ html = viewGroundwork(); }
  else { html = state.view==='dashboard'?viewDashboard() : state.view==='clients'?viewClients() : state.view==='email'?viewEmail() : viewRecord(); }
  $('wrap').innerHTML = html;
  renderNav();
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openRecord(+el.dataset.open));
  document.querySelectorAll('[data-cg]').forEach(el=>el.onclick=(ev)=>{ ev.stopPropagation(); state.clientsGroup=el.dataset.cg; render(); });
  const s=$('search'); if(s){ s.oninput=e=>{ state.query=e.target.value; render(); }; s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
  const b=$('back'); if(b) b.onclick=()=>{ state.view=state.from||'clients'; render(); };
  if(state.view==='email') bindEmail();
}
if(location.hash==='#legacy') state.section='legacy';
if(location.hash==='#ground') state.section='ground';
state.view=(SECTIONS[state.section].tabs[0]||['dashboard'])[0];
render();
</script>
